<style>

    position: sticky; top: 48px; z-index: 40;
  }
  nav button {
    flex: 1; min-width: 80px; padding: 14px 8px;
    background: none; border: none; font-size: 14px; font-weight: 600;
    color: #6a7890; cursor: pointer; border-bottom: 3px solid transparent;
    transition: all 0.15s;
  }
  nav button.active { color: #1a3a5c; border-bottom-color: #c0392b; }
  main { padding: 16px; padding-bottom: 100px; max-width: 720px; margin: 0 auto; }
  section { display: none; }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .filters select, .filters input {

    font-size: 14px; background: #fff; flex: 1; min-width: 100px;
  }
  .meal-card {
    background: #fff; border: 1px solid #e1e6ed; border-radius: 8px;
    padding: 12px; margin-bottom: 10px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .meal-title { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
  .meal-meta { font-size: 12px; color: #6a7890; margin-bottom: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
  .meal-meta span {
    background: #eef2f7; padding: 2px 8px; border-radius: 10px; white-space: nowrap;
  }
  .meal-meta .recent { background: #fde5e2; color: #c0392b; }
  .meal-meta .fresh { background: #e2f0d9; color: #2d6a3f; }
  .meal-ingredients { font-size: 13px; color: #4a5a75; margin-bottom: 10px; }
  .meal-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  button.primary {
    background: #c0392b; color: #fff; border: none; padding: 8px 14px;
    border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  button.secondary {
    background: #fff; color: #1a3a5c; border: 1px solid #cfd7e2; padding: 8px 14px;
    border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
  }

  .big-btn {
    display: block; width: 100%; padding: 16px; margin-bottom: 10px;
    background: #1a3a5c; color: #fff; border: none; border-radius: 8px;
    font-size: 16px; font-weight: 600; cursor: pointer;
  }
  .big-btn.accent { background: #c0392b; }
  .big-btn.muted { background: #fff; color: #1a3a5c; border: 1px solid #cfd7e2; }
  .week-day {
    background: #fff; border: 1px solid #e1e6ed; border-radius: 8px;

  }
  .week-day strong { min-width: 40px; color: #1a3a5c; }
  .week-day .slot {
    flex: 1; color: #6a7890; font-size: 14px;
  }
  .week-day .slot.filled { color: #1a2340; font-weight: 500; }
  .week-day button { padding: 6px 10px; font-size: 12px; }
  .pantry-item {

  }

  .pantry-category { font-weight: 600; color: #1a3a5c; margin: 16px 0 6px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
  .history-item {

  .empty-state { text-align: center; padding: 40px 20px; color: #6a7890; }
  .toast {

<body>

<header>
  <h1>🍽️ Pugh Family Dinners</h1>
</header>

<nav>
  <button data-tab="library" class="active">Library</button>
  <button data-tab="week">Week</button>
  <button data-tab="pantry">Pantry</button>
  <button data-tab="history">History</button>
  <button data-tab="ideas">Ideas</button>
</nav>

<main>
  <section id="library" class="active">
    <h2>Meal Library</h2>
    <div class="filters">
      <select id="filter-protein"><option value="">All proteins</option></select>
      <select id="filter-time"><option value="">Any cook time</option><option>Quick</option><option>Medium</option><option>Long</option></select>
      <input type="search" id="filter-search" placeholder="Search...">
    </div>
    <div id="meal-list"></div>
  </section>

  <section id="week">
    <h2>This Week</h2>
    <div id="week-days"></div>
    <button class="big-btn muted" onclick="clearWeek()">Clear Week</button>
    <button class="big-btn" onclick="generateShoppingList()">📝 Generate Shopping List</button>
  </section>

  <section id="pantry">
    <h2>Pantry</h2>
    <p style="color: #6a7890; font-size: 13px; margin: 0 0 12px;">Check what you currently have. The Ideas tab uses this list.</p>
    <div id="pantry-list"></div>
    <button class="big-btn muted" onclick="addPantryItem()">+ Add Pantry Item</button>
  </section>

  <section id="history">
    <h2>Recent Dinners</h2>
    <p style="color: #6a7890; font-size: 13px; margin: 0 0 12px;">Last 30 days of dinners you've logged.</p>
    <button class="big-btn muted" onclick="addPastMeal()">+ Log a Past Meal</button>
    <div id="history-list"></div>
  </section>

  <section id="ideas">
    <h2>Meal Ideas</h2>
    <div class="ideas-form">
      <label>Get meal ideas for:</label>
      <select id="idea-scope">
        <option value="tonight">Tonight</option>
        <option value="week">The whole week</option>
      </select>
      <label>Cook time preference:</label>
      <select id="idea-time">
        <option value="any">Any</option>
        <option value="Quick">Quick (&lt;30 min)</option>
        <option value="Medium">Medium (30-60 min)</option>
        <option value="Long">Long (60+ min)</option>
      </select>
      <label><input type="checkbox" id="idea-pantry" checked> Use what's in pantry when possible</label>
      <label><input type="checkbox" id="idea-kids" checked> Kid-friendly (Marcelle 5, Nora 3)</label>
      <button class="big-btn accent" onclick="generateMealIdea()">💡 Get Meal Ideas</button>
    </div>

    <div class="ideas-form">
      <label>Get a recipe for:</label>
      <input type="text" id="recipe-name" placeholder="e.g. Chicken Burritos">
      <button class="big-btn" onclick="generateRecipe()">🧑‍🍳 Get Recipe</button>
    </div>

    <div class="ideas-form">
      <label style="margin-bottom: 10px;">Data Management</label>
      <button class="big-btn muted" onclick="exportData()">⬇️ Export Data (backup)</button>
      <button class="big-btn muted" onclick="importData()">⬆️ Import Data (restore)</button>
      <p style="color: #6a7890; font-size: 12px; margin: 8px 0 0;">Phase 1: data lives on this device only. Use export/import to move between devices until Phase 2 sync ships.</p>
    </div>
  </section>
</main>

<button class="fab" onclick="openAddMealModal()" title="Add new meal">+</button>

<div class="modal-bg" id="modal">
  <div class="modal" id="modal-content"></div>
</div>

<div class="toast" id="toast"></div>

const DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

// ==================== STATE ====================

const state = {
  meals: [],
  history: [],       // [{date: 'YYYY-MM-DD', meal: 'name'}]
  week: {},          // {Mon: 'name', Tue: ...}
  pantry: {},        // {'Chicken breasts': true, ...}
  customPantry: {},  // user-added categories
};

function load() {
  const saved = localStorage.getItem('pugh_meals_v1');
  if (saved) {
    try { Object.assign(state, JSON.parse(saved)); }
    catch (e) { console.error(e); }
  }
  if (!state.meals || state.meals.length === 0) state.meals = [...DEFAULT_MEALS];
  if (!state.history) state.history = [];
  if (!state.week) state.week = {};
  if (!state.pantry) state.pantry = {};
  if (!state.customPantry) state.customPantry = {};
}

function save() {
  localStorage.setItem('pugh_meals_v1', JSON.stringify(state));
}

// ==================== NAV ====================

document.querySelectorAll('nav button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('nav button').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('section').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById(b.dataset.tab).classList.add('active');
  });
});

// ==================== LIBRARY ====================

function populateProteinFilter() {
  const proteinSel = document.getElementById('filter-protein');
  const currentValue = proteinSel.value;
  const proteins = [...new Set(state.meals.map(m => m.p))].sort();
  proteinSel.innerHTML = '<option value="">All proteins</option>' +
    proteins.map(p => `<option${currentValue === p ? ' selected' : ''}>${p}</option>`).join('');
}

function renderLibrary() {
  const timeFilter = document.getElementById('filter-time').value;
  const proteinFilter = document.getElementById('filter-protein').value;
  const searchFilter = document.getElementById('filter-search').value.toLowerCase();

  const list = document.getElementById('meal-list');
  const filtered = state.meals.filter(m => {
    if (timeFilter && m.t !== timeFilter) return false;
    if (proteinFilter && m.p !== proteinFilter) return false;
    if (searchFilter) {
      const hay = (m.n + ' ' + m.i + ' ' + m.c).toLowerCase();
      if (!hay.includes(searchFilter)) return false;
    }
    return true;
  });

  // Sort: longest since made first (encourage variety)
  filtered.sort((a, b) => {
    const aDays = daysSince(a.l);
    const bDays = daysSince(b.l);
    return bDays - aDays;
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">No meals match those filters</div>';
    return;
  }

  list.innerHTML = filtered.map(m => {
    const daysAgo = daysSince(m.l);
    const dayTag = m.l ?
      (daysAgo < 14 ? `<span class="recent">${daysAgo}d ago</span>` :
       daysAgo > 60 ? `<span class="fresh">${daysAgo}d ago</span>` :
       `<span>${daysAgo}d ago</span>`) :
      '<span class="fresh">Never made</span>';
    return `
      <div class="meal-card">
        <div class="meal-title">${m.n}</div>
        <div class="meal-meta">
          <span>${m.p}</span>
          <span>${m.t}</span>
          <span>${m.c}</span>
          ${m.k ? '<span class="fresh">Kid approved</span>' : ''}
          ${dayTag}
        </div>
        <div class="meal-ingredients">${m.i}</div>
        <div class="meal-actions">
          <button class="primary" onclick="hadTonight('${escapeQ(m.n)}')">Had this tonight</button>
          <button class="secondary" onclick="addToWeek('${escapeQ(m.n)}')">Add to Week</button>
          <button class="secondary" onclick="document.getElementById('recipe-name').value='${escapeQ(m.n)}'; switchTab('ideas'); generateRecipe();">Recipe</button>
        </div>
      </div>`;
  }).join('');
}

function daysSince(dateStr) {
  if (!dateStr) return 9999;
  const then = new Date(dateStr);
  const now = new Date();
  return Math.floor((now - then) / (1000 * 60 * 60 * 24));
}

function escapeQ(s) { return (s || '').replace(/'/g, "\\'"); }

function hadTonight(mealName) {
  const meal = state.meals.find(m => m.n === mealName);
  if (!meal) return;
  const today = new Date().toISOString().split('T')[0];
  meal.l = today;
  state.history.unshift({date: today, meal: mealName});
  state.history = state.history.slice(0, 180); // keep 6 months
  save();
  renderAll();
  toast(`✓ Logged: ${mealName}`);
}

['filter-protein','filter-time','filter-search'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderLibrary);
});

// ==================== WEEK ====================

function renderWeek() {
  const el = document.getElementById('week-days');
  el.innerHTML = DAYS.map(d => {
    const meal = state.week[d];
    return `
      <div class="week-day">
        <strong>${d}</strong>
        <span class="slot ${meal ? 'filled' : ''}">${meal || '— empty —'}</span>
        ${meal ? `<button class="secondary" onclick="removeFromWeek('${d}')">×</button>` : ''}
      </div>`;
  }).join('');
}

function addToWeek(mealName) {
  const day = prompt("Which day? (Mon, Tue, Wed, Thu, Fri, Sat, Sun)");
  if (!day) return;
  const d = day.slice(0,1).toUpperCase() + day.slice(1,3).toLowerCase();
  if (!DAYS.includes(d)) { toast("Day not recognized"); return; }
  state.week[d] = mealName;
  save();
  renderAll();
  toast(`${mealName} → ${d}`);
}

function removeFromWeek(day) {
  delete state.week[day];
  save();
  renderAll();
}

function clearWeek() {
  if (!confirm("Clear all meals from this week?")) return;
  state.week = {};
  save();
  renderAll();
}

function generateShoppingList() {
  const mealsThisWeek = Object.values(state.week);
  if (mealsThisWeek.length === 0) { toast("No meals planned yet"); return; }
  const allIngredients = mealsThisWeek.map(name => {
    const m = state.meals.find(x => x.n === name);
    return m ? `- ${m.n}: ${m.i}` : '';
  }).filter(Boolean).join('\n');

  const pantryItems = getPantryList();
  const prompt = `I'm planning meals for the week. Here are the meals and their key ingredients:

${allIngredients}

Here's what I already have in my pantry:
${pantryItems.length ? pantryItems.map(x => `- ${x}`).join('\n') : '(nothing checked)'}

Generate a consolidated shopping list organized by grocery store section (Produce, Meat, Dairy, Pantry, Freezer). Skip anything I already have. Estimate quantities for a family of 4 (2 adults, kids ages 5 and 3).`;

  openClaudeWithPrompt(prompt, "Shopping list");
}

// ==================== PANTRY ====================

function renderPantry() {
  const el = document.getElementById('pantry-list');
  const categories = {...DEFAULT_PANTRY, ...state.customPantry};
  el.innerHTML = Object.entries(categories).map(([cat, items]) => {
    return `<div class="pantry-category">${cat}</div>` +
      items.map(item => {
        const checked = state.pantry[item] ? 'checked' : '';
        const klass = state.pantry[item] ? 'checked' : '';
        return `
          <label class="pantry-item ${klass}">
            <input type="checkbox" ${checked} onchange="togglePantry('${escapeQ(item)}')">
            <span>${item}</span>
          </label>`;
      }).join('');
  }).join('');
}

function togglePantry(item) {
  state.pantry[item] = !state.pantry[item];
  save();
  renderPantry();
}

function getPantryList() {
  return Object.keys(state.pantry).filter(k => state.pantry[k]);
}

function addPantryItem() {
  const item = prompt("Add pantry item (e.g., 'Greek yogurt'):");
  if (!item) return;
  const cat = prompt("Which category? (Proteins, Produce, Dairy, Pantry Staples, Freezer, or a new one)");
  if (!cat) return;
  if (!state.customPantry[cat]) state.customPantry[cat] = [];
  const existing = [...(DEFAULT_PANTRY[cat] || []), ...(state.customPantry[cat] || [])];
  if (!existing.includes(item)) {
    state.customPantry[cat] = [...(state.customPantry[cat] || []), item];
  }
  save();
  renderPantry();
}

// ==================== HISTORY ====================

function renderHistory() {
  const el = document.getElementById('history-list');
  const recent = state.history.slice(0, 60);
  if (recent.length === 0) {
    el.innerHTML = '<div class="empty-state">No dinners logged yet. Use "Had this tonight" on a meal.</div>';
    return;
  }
  el.innerHTML = recent.map((h, idx) => `
    <div class="history-item">
      <span>${h.meal}</span>
      <span style="display: flex; align-items: center; gap: 8px;">
        <input type="date" value="${h.date}" onchange="updateHistoryDate(${idx}, this.value)"
          style="font-size: 12px; padding: 3px 5px; border: 1px solid #cfd7e2; border-radius: 4px;">
        <button class="secondary" style="padding: 4px 10px; font-size: 12px;"
          onclick="removeHistoryEntry(${idx})">✕</button>
      </span>
    </div>`).join('');
}

function removeHistoryEntry(idx) {
  const entry = state.history[idx];
  if (!entry) return;
  if (!confirm(`Remove "${entry.meal}" from ${entry.date}?`)) return;
  state.history.splice(idx, 1);
  // Recalculate last-made for the affected meal
  recalculateLastMade(entry.meal);
  save();
  renderAll();
  toast("✓ Removed");
}

function updateHistoryDate(idx, newDate) {
  if (!newDate) return;
  const entry = state.history[idx];
  if (!entry) return;
  const mealName = entry.meal;
  entry.date = newDate;
  // Re-sort history by date descending
  state.history.sort((a, b) => b.date.localeCompare(a.date));
  recalculateLastMade(mealName);
  save();
  renderAll();
  toast("✓ Date updated");
}

function recalculateLastMade(mealName) {
  const meal = state.meals.find(m => m.n === mealName);
  if (!meal) return;
  const mostRecent = state.history.find(h => h.meal === mealName);
  meal.l = mostRecent ? mostRecent.date : undefined;
}

function addPastMeal() {
  const content = document.getElementById('modal-content');
  const sortedMeals = [...state.meals].sort((a, b) => a.n.localeCompare(b.n));
  const today = new Date().toISOString().split('T')[0];
  content.innerHTML = `
    <h3>Log a Past Meal</h3>
    <label>Meal</label>
    <select id="past-meal">
      ${sortedMeals.map(m => `<option value="${escapeQ(m.n)}">${m.n}</option>`).join('')}
    </select>
    <label>Date we ate it</label>
    <input type="date" id="past-date" value="${today}" max="${today}">
    <div class="modal-actions">
      <button class="secondary" onclick="closeModal()">Cancel</button>
      <button class="primary" onclick="savePastMeal()">Log it</button>
    </div>`;
  document.getElementById('modal').classList.add('active');
}

function savePastMeal() {
  const mealName = document.getElementById('past-meal').value;
  const date = document.getElementById('past-date').value;
  if (!mealName || !date) { toast("Pick a meal and date"); return; }
  state.history.unshift({ date, meal: mealName });
  state.history.sort((a, b) => b.date.localeCompare(a.date));
  state.history = state.history.slice(0, 180);
  recalculateLastMade(mealName);
  save();
  closeModal();
  renderAll();
  toast(`✓ Logged ${mealName} on ${date}`);
}

// ==================== IDEAS ====================

function generateMealIdea() {
  const scope = document.getElementById('idea-scope').value;
  const time = document.getElementById('idea-time').value;
  const usePantry = document.getElementById('idea-pantry').checked;
  const kids = document.getElementById('idea-kids').checked;

  const recentMeals = state.history.slice(0, 20).map(h => h.meal);
  const pantryItems = usePantry ? getPantryList() : [];

  let prompt = `I need ${scope === 'tonight' ? 'a dinner idea for tonight' : 'dinner ideas for the week (7 meals)'}.

Context for the Pugh family:
- Family of 4: 2 adults, kids ages 5 and 3
- ${kids ? 'Kids are picky — need kid-approved meals with familiar proteins and mild flavors' : 'No kid constraints'}
- ${time !== 'any' ? `Prefer ${time} cook time (${time === 'Quick' ? 'under 30 min' : time === 'Medium' ? '30-60 min' : '60+ min'})` : 'Any cook time is fine'}

Meals we've had RECENTLY (don't suggest these):
${recentMeals.length ? recentMeals.map(m => `- ${m}`).join('\n') : '(none logged)'}

${pantryItems.length ? `What's in our pantry right now (prioritize using these):\n${pantryItems.map(x => `- ${x}`).join('\n')}` : ''}

${scope === 'tonight' ? 'Suggest 3 specific meal options with a 1-sentence description each. Pick from common family dinners — you don\'t need to be fancy.' : 'Suggest 7 meals for Mon-Sun, balanced across proteins (chicken, beef, pasta, pork, seafood), with 2-3 being Quick options for busy weeknights.'}`;

  openClaudeWithPrompt(prompt, "Meal ideas");
}

function generateRecipe() {
  const name = document.getElementById('recipe-name').value.trim();
  if (!name) { toast("Type a meal name first"); return; }
  const prompt = `Give me a recipe for ${name}.

- Family of 4 (2 adults, kids 5 and 3)
- Format: ingredients list first, then numbered steps
- Keep it simple and weeknight-friendly
- Include prep time and cook time at the top
- If there's a good kid-friendly adaptation, note it`;

  openClaudeWithPrompt(prompt, `Recipe for ${name}`);
}

function openClaudeWithPrompt(prompt, label) {
  const modal = document.getElementById('modal');
  const content = document.getElementById('modal-content');
  const safePrompt = prompt.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
  content.innerHTML = `
    <h3>${label}</h3>
    <div class="prompt-preview">${prompt.replace(/</g, '&lt;')}</div>
    <p style="color: #6a7890; font-size: 12px; margin: 4px 0 10px;">Pick where to send this. ChatGPT auto-fills the prompt and you just hit Enter. Claude requires a quick paste (Ctrl+V or ⌘+V) since Claude doesn't allow URL pre-fill.</p>
    <div class="modal-actions">
      <button class="secondary" onclick="closeModal()">Close</button>
      <button class="secondary" onclick="copyAndOpenClaude(\`${safePrompt}\`)">📋 Copy & Open Claude</button>
      <button class="primary" onclick="openChatGPT(\`${safePrompt}\`)">⚡ Open in ChatGPT</button>
    </div>`;
  modal.classList.add('active');
}

async function copyAndOpenClaude(prompt) {
  try {
    await navigator.clipboard.writeText(prompt);
    toast("✓ Copied! Paste (Ctrl+V / ⌘+V) in Claude + Enter");
    setTimeout(() => {
      window.open('https://claude.ai/new', '_blank');
      closeModal();
    }, 800);
  } catch (e) {
    alert("Couldn't copy automatically. Select the prompt text in the preview box and copy it manually.");
  }
}

function openChatGPT(prompt) {
  const url = 'https://chatgpt.com/?q=' + encodeURIComponent(prompt) + '&hints=search';
  window.open(url, '_blank');
  closeModal();
  toast("Opening ChatGPT with your prompt pre-filled");
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') closeModal();
});

// ==================== ADD MEAL ====================

function openAddMealModal() {
  const content = document.getElementById('modal-content');
  content.innerHTML = `
    <h3>Add Meal</h3>
    <label>Meal Name</label>
    <input id="am-name" placeholder="e.g. Taco Soup">
    <label>Protein</label>
    <select id="am-protein">
      <option>Chicken</option><option>Beef</option><option>Pork</option>
      <option>Seafood</option><option>Pasta</option><option>Other</option>
    </select>
    <label>Cook Time</label>
    <select id="am-time"><option>Quick</option><option>Medium</option><option>Long</option></select>
    <label>Category</label>
    <input id="am-category" placeholder="e.g. Mexican, Comfort Food">
    <label>Key Ingredients</label>
    <textarea id="am-ingredients" rows="2" placeholder="comma-separated"></textarea>
    <label>Who Cooks</label>
    <select id="am-who"><option>Either</option><option>Steph</option><option>Stephen</option></select>
    <label><input type="checkbox" id="am-kids"> Kid approved</label>
    <div class="modal-actions">
      <button class="secondary" onclick="closeModal()">Cancel</button>
      <button class="primary" onclick="saveNewMeal()">Save</button>
    </div>`;
  document.getElementById('modal').classList.add('active');
}

function saveNewMeal() {
  const meal = {
    n: document.getElementById('am-name').value.trim(),
    p: document.getElementById('am-protein').value,
    t: document.getElementById('am-time').value,
    c: document.getElementById('am-category').value.trim() || 'Other',
    i: document.getElementById('am-ingredients').value.trim(),
    w: document.getElementById('am-who').value,
    k: document.getElementById('am-kids').checked,
  };
  if (!meal.n) { alert("Name is required"); return; }
  if (state.meals.find(m => m.n === meal.n)) { alert("That meal already exists"); return; }
  state.meals.push(meal);
  save();
  closeModal();
  renderLibrary();
  toast(`✓ Added: ${meal.n}`);
}

// ==================== EXPORT / IMPORT ====================

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `pugh-meals-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast("✓ Backup downloaded");
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const imported = JSON.parse(text);
      if (!confirm("This will replace all current data. Proceed?")) return;
      Object.assign(state, imported);
      save();
      renderAll();
      toast("✓ Data restored");
    } catch (e) {
      alert("Couldn't parse that file: " + e.message);
    }
  };
  input.click();
}

// ==================== UTIL ====================

function switchTab(name) {
  document.querySelector(`nav button[data-tab="${name}"]`).click();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function renderAll() {
  populateProteinFilter();
  renderLibrary();
  renderWeek();
  renderPantry();
  renderHistory();
}

// ==================== INIT ====================

load();
renderAll();

// ==================== SERVICE WORKER / AUTO-UPDATE ====================

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').then(reg => {
      // Check for updates every time the app opens
      reg.update();
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        if (newWorker) {
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // New version ready — reload after a short delay
              toast("✨ New version available — refreshing...");
              setTimeout(() => window.location.reload(), 1500);
            }
          });
        }
      });
    }).catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
